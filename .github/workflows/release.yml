name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            harness-script: build:mac-arm
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

          - platform: macos-latest
            harness-script: build:mac-x64
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'

          - platform: ubuntu-22.04
            harness-script: build:linux
            rust-target: x86_64-unknown-linux-gnu
            args: ''

          - platform: windows-latest
            harness-script: build:win
            rust-target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            libfuse2

      - name: Install frontend deps
        run: pnpm install

      - name: Install harness deps
        run: bun install
        working-directory: packages/harness

      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries

      - name: Build harness binary
        run: bun run ${{ matrix.harness-script }}
        working-directory: packages/harness

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Tables ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseCommitish: main
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          owner: been-there-done-that
          repo: tables-releases
