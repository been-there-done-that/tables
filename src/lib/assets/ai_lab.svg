<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Lab Pot / Reactor Vessel -->
  <path d="M100 150 C 100 250, 300 250, 300 150 L 300 100 L 100 100 Z" stroke="#cbd5e1" stroke-width="2" fill="none" opacity="0.3"/>
  <ellipse cx="200" cy="100" rx="100" ry="20" stroke="#cbd5e1" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Liquid Content -->
  <path d="M110 150 C 110 230, 290 230, 290 150 L 290 140 C 250 160, 150 160, 110 140 Z" fill="url(#grad1)" opacity="0.2"/>

  <!-- Bubbles -->
  <circle cx="180" cy="200" r="5" fill="#3b82f6" opacity="0.6">
    <animate attributeName="cy" values="200;120" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="220" cy="180" r="3" fill="#8b5cf6" opacity="0.6">
     <animate attributeName="cy" values="180;110" dur="2.5s" repeatCount="indefinite" />
     <animate attributeName="opacity" values="0.6;0" dur="2.5s" repeatCount="indefinite" />
  </circle>

  <!-- AI Brain / Network Nodes -->
  <g filter="url(#glow)">
    <!-- Central Node -->
    <circle cx="200" cy="130" r="10" fill="url(#grad2)" />
    
    <!-- Surrounding Nodes -->
    <circle cx="160" cy="110" r="6" fill="#3b82f6" />
    <circle cx="240" cy="110" r="6" fill="#3b82f6" />
    <circle cx="170" cy="160" r="6" fill="#8b5cf6" />
    <circle cx="230" cy="160" r="6" fill="#8b5cf6" />
    
    <!-- Connections -->
    <line x1="200" y1="130" x2="160" y2="110" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5" />
    <line x1="200" y1="130" x2="240" y2="110" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5" />
    <line x1="200" y1="130" x2="170" y2="160" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5" />
    <line x1="200" y1="130" x2="230" y2="160" stroke="#cbd5e1" stroke-width="1.5" opacity="0.5" />
    <line x1="160" y1="110" x2="170" y2="160" stroke="#cbd5e1" stroke-width="1" opacity="0.3" />
    <line x1="240" y1="110" x2="230" y2="160" stroke="#cbd5e1" stroke-width="1" opacity="0.3" />
    
    <!-- Floating Data Streams -->
    <path d="M150 80 Q 200 60 250 80" stroke="#ef4444" stroke-width="1" fill="none" stroke-dasharray="5,5">
        <animate attributeName="stroke-dashoffset" from="10" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M140 200 Q 200 220 260 200" stroke="#f59e0b" stroke-width="1" fill="none" stroke-dasharray="4,4">
        <animate attributeName="stroke-dashoffset" from="0" to="8" dur="1.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Pipes -->
  <path d="M80 140 L 100 140" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
  <path d="M300 140 L 320 140" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
  
</svg>
