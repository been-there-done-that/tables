<h2>Chip Style — Pick One</h2>
<p class="subtitle">Full pill vs small-rounded rectangle (matches the icon buttons already in the titlebar)</p>

<div class="split" style="gap:16px">

  <!-- Option A: Full pill -->
  <div class="mockup" data-choice="a" onclick="toggleSelect(this)" style="cursor:pointer">
    <div class="mockup-header">A — Full pill (border-radius: 999px)</div>
    <div class="mockup-body" style="padding:0">
      <div style="background:var(--theme-bg-secondary);border-radius:6px;overflow:hidden;border:1px solid var(--theme-border-default)">
        <div style="display:flex;align-items:center;justify-content:flex-end;padding:0 8px;height:32px;gap:6px">
          <div style="display:flex;align-items:center;gap:5px;background:color-mix(in srgb, var(--theme-accent-primary) 15%, transparent);border:1px solid color-mix(in srgb, var(--theme-accent-primary) 40%, transparent);border-radius:999px;padding:2px 9px;margin-right:4px">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--theme-accent-primary)"></div>
            <span style="font-size:11px;color:var(--theme-accent-primary);font-weight:500">v0.3.0 available</span>
          </div>
          <div style="width:20px;height:20px;border-radius:5px;background:var(--theme-bg-hover);opacity:0.6;display:flex;align-items:center;justify-content:center"><div style="width:10px;height:10px;border:1.5px solid var(--theme-fg-tertiary);border-radius:2px"></div></div>
          <div style="width:20px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center"><div style="width:11px;height:8px;border:1.5px solid var(--theme-fg-tertiary);border-radius:1px"></div></div>
          <div style="width:24px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--theme-fg-tertiary)">⚙</div>
        </div>
        <!-- same pill, downloading state -->
        <div style="display:flex;align-items:center;justify-content:flex-end;padding:0 8px;height:32px;gap:6px;border-top:1px solid var(--theme-border-subtle)">
          <div style="display:flex;align-items:center;gap:5px;background:var(--chip-result-bg);border:1px solid var(--chip-result-border);border-radius:999px;padding:2px 9px;margin-right:4px">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--chip-result-color)"></div>
            <span style="font-size:11px;color:var(--chip-result-color);font-weight:500">Restart to install</span>
          </div>
          <div style="width:20px;height:20px;border-radius:5px;background:var(--theme-bg-hover);opacity:0.6;display:flex;align-items:center;justify-content:center"><div style="width:10px;height:10px;border:1.5px solid var(--theme-fg-tertiary);border-radius:2px"></div></div>
          <div style="width:20px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center"><div style="width:11px;height:8px;border:1.5px solid var(--theme-fg-tertiary);border-radius:1px"></div></div>
          <div style="width:24px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--theme-fg-tertiary)">⚙</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Option B: Small rounded (matches icon buttons) -->
  <div class="mockup" data-choice="b" onclick="toggleSelect(this)" style="cursor:pointer">
    <div class="mockup-header">B — Small rounded (border-radius: 6px, matches icon buttons)</div>
    <div class="mockup-body" style="padding:0">
      <div style="background:var(--theme-bg-secondary);border-radius:6px;overflow:hidden;border:1px solid var(--theme-border-default)">
        <div style="display:flex;align-items:center;justify-content:flex-end;padding:0 8px;height:32px;gap:6px">
          <div style="display:flex;align-items:center;gap:5px;background:color-mix(in srgb, var(--theme-accent-primary) 15%, transparent);border:1px solid color-mix(in srgb, var(--theme-accent-primary) 40%, transparent);border-radius:6px;padding:2px 9px;margin-right:4px">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--theme-accent-primary)"></div>
            <span style="font-size:11px;color:var(--theme-accent-primary);font-weight:500">v0.3.0 available</span>
          </div>
          <div style="width:20px;height:20px;border-radius:5px;background:var(--theme-bg-hover);opacity:0.6;display:flex;align-items:center;justify-content:center"><div style="width:10px;height:10px;border:1.5px solid var(--theme-fg-tertiary);border-radius:2px"></div></div>
          <div style="width:20px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center"><div style="width:11px;height:8px;border:1.5px solid var(--theme-fg-tertiary);border-radius:1px"></div></div>
          <div style="width:24px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--theme-fg-tertiary)">⚙</div>
        </div>
        <!-- restart state -->
        <div style="display:flex;align-items:center;justify-content:flex-end;padding:0 8px;height:32px;gap:6px;border-top:1px solid var(--theme-border-subtle)">
          <div style="display:flex;align-items:center;gap:5px;background:var(--chip-result-bg);border:1px solid var(--chip-result-border);border-radius:6px;padding:2px 9px;margin-right:4px">
            <div style="width:6px;height:6px;border-radius:50%;background:var(--chip-result-color)"></div>
            <span style="font-size:11px;color:var(--chip-result-color);font-weight:500">Restart to install</span>
          </div>
          <div style="width:20px;height:20px;border-radius:5px;background:var(--theme-bg-hover);opacity:0.6;display:flex;align-items:center;justify-content:center"><div style="width:10px;height:10px;border:1.5px solid var(--theme-fg-tertiary);border-radius:2px"></div></div>
          <div style="width:20px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center"><div style="width:11px;height:8px;border:1.5px solid var(--theme-fg-tertiary);border-radius:1px"></div></div>
          <div style="width:24px;height:20px;border-radius:5px;opacity:0.4;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--theme-fg-tertiary)">⚙</div>
        </div>
      </div>
    </div>
  </div>

</div>
